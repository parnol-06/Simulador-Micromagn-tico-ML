version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Simulador Micromagnético ML — Fase 4
#  Docker Compose
#
#  Uso rápido:
#    docker compose up --build          # primera vez
#    docker compose up -d               # en background
#    docker compose down                # detener
#    docker compose logs -f             # ver logs
# ─────────────────────────────────────────────────────────────────────────────

services:
  simulador:
    build:
      context: .
      dockerfile: Dockerfile
    image: micromagnetic-simulator:4.0
    container_name: simulador_micromagnetico

    # ── Puertos ───────────────────────────────────────────────────────────────
    ports:
      - "8501:8501"

    # ── Volúmenes ─────────────────────────────────────────────────────────────
    # outputs/    → figuras exportadas persisten en tu máquina
    # data/       → base de datos SQLite persiste entre reinicios del contenedor
    # oommf_data/ → archivos OOMMF subidos desde la UI se guardan aquí
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./oommf_data:/app/oommf_data

    # ── Variables de entorno ──────────────────────────────────────────────────
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/simulations.db

    # ── Política de reinicio ──────────────────────────────────────────────────
    restart: unless-stopped

    # ── Health check ──────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Recursos (opcional — descomenta si quieres límites) ──────────────────
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2.0"
    #       memory: 1G
    #     reservations:
    #       memory: 512M
